
# USAGE:
# cmd: bin\openocd.exe  -c "gdb_port 30000" -s scripts -f interface\ft2232h-ftdi-swd.cfg  -f target\3061MNPIK8-swd.cfg
# cmd: bin\openocd.exe  -c "gdb_port 30000" -s scripts -f interface\ft2232h-ftdi-swd.cfg  -f target\3061MNPIK8-swd.cfg  -d3 -l log.txt
# cmd: telnet localhost 4444

# enable coresight-swd mode
# mww 0x40010260 1

# adapter speed 1000

transport select swd

set  _CHIPNAME 3061MNPIK8
set  _CHIPNAME_MAIN 3061MNPIK8_MAIN
set  _CHIPNAME_INFO 3061MNPIK8_INFO

# 3061MNPIK8 SWD mode  _CPUTAPID 0x5ba02477
set _CPUTAPID 0x5ba02477 
set  _ENDIAN little

#SWD mode will not USAGE irlen/-ircapture/-irmask 
swd newdap $_CHIPNAME cpu -expected-id $_CPUTAPID

dap create $_CHIPNAME.dap -chain-position $_CHIPNAME.cpu
set _TARGETNAME $_CHIPNAME.cpu
target create $_TARGETNAME riscvcs -endian $_ENDIAN -apsel 0 -dap $_CHIPNAME.dap -dbgbase 0x80000000

set _MAIN_FLASHNAME $_CHIPNAME_MAIN.flash
set _INFO_FLASHNAME $_CHIPNAME_INFO.flash
# flash bank bank_id driver_name base_address size_bytes chip_width_bytes bus_width_bytes target
flash bank $_MAIN_FLASHNAME hm64 0x03000000 0x10000 0 0 $_TARGETNAME
flash bank $_INFO_FLASHNAME hm3061m_info 0x03800000 0x4000 0 0 $_TARGETNAME

# 0X7c0~0x7cf 2008=7d8
riscv expose_csrs 932-943,1984-1999,2008
riscv set_prefer_sba off

init
halt
# If load_image fails, reduce the FREQUENCY

# adapter speed 1000

