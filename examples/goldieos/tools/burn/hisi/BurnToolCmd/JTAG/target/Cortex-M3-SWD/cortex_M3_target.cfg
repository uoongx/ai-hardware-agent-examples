
set _CHIPNAME chipName
set _DAP_TAPID 0x2ba01477

swd newdap $_CHIPNAME cpu -irlen 4 -ircapture 0x1 -irmask 0x0f -expected-id $_DAP_TAPID

set TARGETNAME $_CHIPNAME.cpu_m3
dap create $_CHIPNAME.dap -chain-position $_CHIPNAME.cpu

target create $TARGETNAME cortex_m3 -endian little -dap $_CHIPNAME.dap


