
# USAGE:
# cmd: bin\openocd.exe  -c "gdb_port 30000" -s scripts -f interface\ft2232h-ftdi-swd.cfg  -f target\3061HRPIKZ-swd.cfg
# cmd: bin\openocd.exe  -c "gdb_port 30000" -s scripts -f interface\ft2232h-ftdi-swd.cfg  -f target\3061HRPIKZ-swd.cfg  -d3 -l log.txt
# cmd: telnet localhost 4444

# enable coresight-swd mode
# mww 0x40010260 1

# adapter speed 1000

transport select jtag
set  _CHIPNAME NB18
set _CPUTAPID 0x5ba00477
set  _ENDIAN little
# echo "Hello RISC-V SWD World！"
#SWD mode will not USAGE irlen/-ircapture/-irmask 
jtag newtap $_CHIPNAME cpu -irlen 4  -expected-id $_CPUTAPID
set _FLASHNAME $_CHIPNAME.flash

dap create $_CHIPNAME.dap -chain-position $_CHIPNAME.cpu
set _TARGETNAME $_CHIPNAME.cpu
target create $_TARGETNAME riscvcs -endian $_ENDIAN -apsel 2 -dap $_CHIPNAME.dap -dbgbase 0x80000000
flash bank $_FLASHNAME nb 0x01000000 0x200000 0 0 $_TARGETNAME

# 0X7c0~0x7cf 2008=7d8
riscv expose_csrs 932-943,1984-1999,2008
riscv set_prefer_sba off

init
halt
# If load_image fails, reduce the FREQUENCY

# adapter speed 1000

#print log
#echo "Hello RISC-V SWD World！"


