Window:window.h:窗口控件，根容器，没有父控件
ButtonView:button_view.h:按钮控件，可设置大小，相对父控件的位置，文字，形状，背景图片，背景颜色，字体颜色(字体颜色只支持黑色或白色)，可见性等。
FrameView:frame_view.h:容器控件，可设置大小，相对父控件的位置，形状，背景图片，背景颜色，可见性等。可作为其他控件的父设备。
ListView:list_view.h:列表控件，可设置大小，相对父控件的位置，文字，形状，背景颜色，字体颜色(字体颜色只支持黑色或白色)，可见性等。设置的文字显示在列表作为标题。
CheckboxView:checkbox_view.h:勾选框控件，默认是圆形，注意设置大小时需要长宽相等。可设置大小，相对父控件的位置，形状，背景颜色，可见性等
LabelView:label_view.h:一个标签控件，用于显示文字或者图片。可设置大小，相对父控件的位置，文字，形状，背景图片，背景颜色，字体颜色(字体颜色只支持黑色或白色)，可见性等。
TextEditView:textedit_view.h:一个文本输入框控件。可设置大小，相对父控件的位置，文字，形状，背景图片，背景颜色，字体颜色(字体颜色只支持黑色或白色)，可见性等。
InputMethodView:inputmethod_view.h:一个输入法控件。可设置大小，相对父控件的位置，可见性等，注意该控件的大小不应小于960(w) x 480(h)，否则可能显示不全。
SpinnerView:spinner_view.h: spinner控件，可设置大小，相对父控件的位置，可见性等，并且可以向ListView一样设置列表。
ImgButtonView:imgbutton_view.h:imgbutton 控件,可设置自锁属性，通过设置不同状态下的背景图来模拟各种形式的按键，可设置大小，相对父控件的位置，可见性等。
ProgressBarView:progressbar_view.h:进度条控件。可设置大小，相对父控件的位置，可见性等。
DateTimeView:datetime_view.h:用于显示时间和日期的控件。可设置大小，相对父控件的位置，可见性等。
ScrollView:scroll_view.h:可滑动的容器控件，可设置大小，相对父控件的位置，形状，背景图片，背景颜色，可见性等。可作为其他控件的父设备。
BatteryView:battery_view.h:自定义的lable,显示电池电量。
WifiView:wifi_view.h:自定义的lable,显示wifi信号。
NearLinkView:nearlink_view.h:自定义的lable,显示星闪状态。